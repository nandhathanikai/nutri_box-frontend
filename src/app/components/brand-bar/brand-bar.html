<div class="brand-bar">
  <div class="brand-bar-glow-top"></div>
  <div class="brand-bar-inner">
    <div class="brand-logo-wrap brand-logo-hover-container">
      <div class="shimmer-logo-wrap">
        <img src="/logo1.png" alt="Nutribox Logo" class="brand-logo logo-shimmer-effect" />
        <span class="logo-glow-ring"></span>
      </div>
      <span class="brand-pulse-ring"></span>
    </div>
    <div class="brand-text">
      <div class="brand-name-row">
        <span class="brand-name">{{ businessName }}</span>
      </div>
      <span class="brand-tagline">🌿 Healthy Meals &middot; Delivered Fresh</span>
    </div>
    <div class="brand-bar-trust">
      <span class="trust-chip">
        <span class="trust-dot"></span>
        Mon – Sat Delivery
      </span>
    </div>
  </div>
</div>
