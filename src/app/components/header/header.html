<header class="header">
  <div class="container header-content">
    <div class="logo brand-logo-hover-container" (click)="openLogoPreview($event)">
      <div class="shimmer-logo-wrap">
        <img src="/logo1.png" alt="Nutribox" class="logo-img logo-shimmer-effect" />
        <span class="logo-glow-ring"></span>
      </div>
      <span class="logo-text">Nutribox</span>
    </div>

    @if (isLoggedIn) {
      <nav class="nav desktop-nav">
        <a routerLink="/dashboard" routerLinkActive="active" class="nav-link">Dashboard</a>
        <a routerLink="/plans" routerLinkActive="active" class="nav-link">Plans</a>
      </nav>
    }

    <div class="actions">
      @if (isLoggedIn) {
        <button type="button" class="icon-btn header-btn notif-btn" aria-label="Announcements & Offers" (click)="openDrawer()">
          <i class="pi pi-bell"></i>
          <span class="notif-badge" *ngIf="unreadCount > 0">{{ unreadCount > 9 ? '9+' : unreadCount }}</span>
        </button>
        <div class="avatar-wrapper">
          <div class="avatar-initials header-avatar" (click)="toggleAvatarMenu()">{{ initials }}</div>
          
          @if (avatarMenuOpen) {
            <div class="avatar-menu-backdrop" (click)="closeAvatarMenu()"></div>
            <div class="avatar-menu" [class.open]="avatarMenuOpen">
              <div class="am-header mobile-only">
                <h3>Account</h3>
                <button class="icon-btn" (click)="closeAvatarMenu()"><i class="pi pi-times"></i></button>
              </div>
              <div class="am-body">
                <a routerLink="/profile" class="am-link" (click)="closeAvatarMenu()"><i class="pi pi-user"></i> Profile</a>
                <a routerLink="/plans" class="am-link" (click)="closeAvatarMenu()"><i class="pi pi-box"></i> My Plan</a>
                <a routerLink="/dashboard/credits" class="am-link" (click)="closeAvatarMenu()"><i class="pi pi-wallet"></i> Credits</a>
                <hr class="am-divider" />
                <button class="am-link text-danger" (click)="logout()"><i class="pi pi-sign-out"></i> Log out</button>
              </div>
            </div>
          }
        </div>
      } @else {
        <a routerLink="/login" class="btn-unified btn-ghost sign-in-btn">Sign in</a>
      }
    </div>
  </div>

  <app-notifications-drawer [(visible)]="drawerOpen"></app-notifications-drawer>
</header>

<!-- Brand Logo Lightbox/Preview Overlay -->
@if (logoPreviewOpen) {
  <div class="logo-preview-backdrop" (click)="closeLogoPreview()">
    <div class="logo-preview-container" (click)="$event.stopPropagation()">
      <button class="logo-preview-close" aria-label="Close Preview" (click)="closeLogoPreview()">
        <i class="pi pi-times"></i>
      </button>
      <div class="logo-preview-card">
        <img src="/logo1.png" alt="Nutribox Brand Logo" class="logo-preview-img" />
      </div>
    </div>
  </div>
}
